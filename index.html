<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PUBG ARMORY - 메인</title>
    <style>
        /* 기본 스타일 */
        body { 
            background-color: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
        }

        /* 헤더 스타일 */
        header { 
            background-color: rgba(17, 17, 17, 0.9); 
            padding: 20px 50px; 
            display: flex; 
            justify-content: flex-end;
            position: sticky; 
            top: 0;
            z-index: 100;
        }
        nav ul { 
            list-style: none; 
            display: flex; 
            gap: 30px; 
            margin: 0; 
            padding: 0;
        }
        nav a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #FF9800;
        }

        /* 히어로 섹션 */
        .hero { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                              url('https://cdn.econovill.com/news/photo/202101/515054_419010_2532.jpg'); 
            background-size: cover;
            background-position: center 30%;
            background-attachment: fixed;
            background-repeat: no-repeat;
            text-align: center; 
            padding: 160px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .central-logo-container {
            border: 4px solid #FF9800; 
            border-radius: 100px; 
            padding: 25px 70px; 
            display: inline-block; 
            box-shadow: 0 0 30px rgba(255, 152, 0, 0.5); 
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px);
        }
        .central-logo { 
            color: #FF9800; 
            font-size: 56px; 
            font-weight: 900; 
            margin: 0;
            text-transform: uppercase; 
            letter-spacing: 4px; 
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        /* 총기 카테고리 섹션 */
        .categories { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 25px; 
            padding: 80px 50px; 
            background-color: #111; 
        }

        .category-card { 
            background-color: #222; 
            padding: 60px 20px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.4s ease;
            border: 1px solid #333;
            position: relative;
            overflow: hidden; 
            background-size: cover;
            background-position: center;
        }

        /* 호버 시 공통 효과 */
        .category-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 10px 25px rgba(255, 152, 0, 0.4);
            border-color: #fff;
        }

        .category-card:hover::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1;
        }

        .category-card h3, .category-card p {
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        /* 클래스별 배경 이미지 */
        .category-card.ar:hover { background-image: url('../img/총-m416.webp'); }
        .category-card.dmr:hover { background-image: url('../img/총-sks.webp'); }
        .category-card.sr:hover { background-image: url('../img/총-kar98k.webp'); }
        .category-card.smg:hover { background-image: url('../img/총-mp5k.webp'); }

        .category-card h3 { font-size: 26px; margin: 0 0 10px 0; }
        .category-card p { font-size: 16px; margin: 0; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">총기 도감</a></li>
            </ul>
        </nav>
    </header>

    <div class="hero">
        <div class="central-logo-container">
            <h1 class="central-logo">PUBG ARMORY</h1>
        </div>
    </div>

    <section class="categories">
        <div class="category-card ar" onclick="location.href='html/ar_list.html'">
            <h3>AR</h3>
            <p>돌격소총</p>
        </div>
        
        <div class="category-card dmr" onclick="location.href='html/dmr_list.html'">
            <h3>DMR</h3>
            <p>지정사수소총</p>
        </div>

        <div class="category-card sr" onclick="location.href='html/sr_list.html'">
            <h3>SR</h3>
            <p>저격소총</p>
        </div>

        <div class="category-card smg" onclick="location.href='html/smg_list.html'">
            <h3>SMG</h3>
            <p>기관단총</p>
        </div>
    </section>

</body>
</html>
